<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>INFOWAVE IT - STUDENT CONTACT FORM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="icon" type="image/png" href="https://i.ibb.co/gMfpfStG/circle-infowave.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #000000, #0dbbd7);
        }

        .container {
            width: 550px; 
            background: rgba(255, 255, 255, .95);
            padding: 35px;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
            animation: show .8s;
        }

        @keyframes show {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
            }
        }

        .logo {
            width: 160px; 
            display: block;
            margin: auto;
        }

        .title {
            text-align: center;
            color: rgb(0, 0, 0);
            margin: 10px 0;
            font-size: 26px;
        }

        .subtitle {
            text-align: center;
            color: #777;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .input {
            position: relative;
            margin: 18px 0;
        }

        .input input, .input select {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #ddd;
            font-size: 15px;
            outline: none;
            font-family: 'Poppins', sans-serif;
            margin-top: 5px;
            background: white;
        }

        .input input:focus, .input select:focus {
            border-color: #12b6d3;
            box-shadow: 0 0 8px #12b6d3;
        }

        label {
            font-size: 15px;
            color: #252121;
            font-weight: 600;
        }

        .checkbox {
            margin: 20px 0;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(90deg, #0bbbd8, #05728b);
            color: white;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            transform: scale(1.03);
        }

        /* Popup Styles */
        .popup {
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
        }

        .popup-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); 
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        .success-icon {
            background: rgb(60, 160, 200);
            color: white;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            margin: 0 auto 20px auto;
        }

        .popup-content h2 { 
            color: #201f1f; 
            margin-bottom: 10px; 
            font-size: 24px;
        }

        .popup-content p { 
            color: #181717; 
            margin-bottom: 25px; 
            line-height: 1.5; 
            font-size: 15px;
        }

        .popup-content button {
            width: 100%;
            padding: 14px;
            background: #42a5f5; 
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .popup-content button:hover {
            background: #1e88e5;
        }

        /* --- यहाँ से मोबाइल के लिए नया कोड जोड़ा गया है --- */
        @media (max-width: 600px) {
            body {
                align-items: flex-start; /* मोबाइल पर फॉर्म ऊपर से शुरू होगा */
            }
            .container {
                width: 100%;
                min-height: 100vh;  /* मोबाइल पर फॉर्म पूरी स्क्रीन की हाइट लेगा */
                border-radius: 0;   /* इससे गोल कोने (Round Corners) पूरी तरह हट जाएंगे */
                padding: 25px 20px; /* मोबाइल स्क्रीन के हिसाब से पैडिंग सेट की */
                box-shadow: none;   /* फुल स्क्रीन पर शैडो की जरूरत नहीं है */
            }
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://i.ibb.co/gMfpfStG/circle-infowave.png" class="logo" alt="Logo">
    <h2 class="title">Student Enrollment Form</h2>
    <p class="subtitle">INFOWAVE IT TERMINAL</p>

    <form id="form">
        <div class="input">
            <label>Full Name</label>
            <input id="studentName" placeholder="Enter Full Name" required>
        </div>

        <div class="input">
            <label>Address</label>
            <input id="address" placeholder="Enter Address" required>
        </div>

        <div class="input">
            <label>Email-ID</label>
            <input type="email" id="email" placeholder="Enter Email-ID" required>
        </div>

        <div class="input">
            <label>Contact No</label>
            <input id="contact" maxlength="10" placeholder="Enter Mobile Number" required>
        </div>

        <div class="input">
            <label>Are you working?</label>
            <select id="working" required>
                <option value="" disabled selected>Select Yes / No</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>
        </div>

        <div class="input">
            <label>Name of Batch (Whatsapp Group Name)</label>
            <input id="batch" placeholder="e.g. 2026_January_A_P_7-9" required>
        </div>

        <div class="checkbox">
            <input type="checkbox" id="check">
            &nbsp;I confirm that all information is correct
        </div>

        <button id="btn" type="submit">Submit Application</button>
    </form>
</div>

<div class="popup" id="popup">
    <div class="popup-content">
        <div class="success-icon">✓</div>
        <h2>Thank You!</h2>
        <p>Your form is submitted successfully, Your Details record in INFOWAVE IT</p>
        <button onclick="closePopup()">Done</button>
    </div>
</div>

<script>
    const sheetURL = "https://sheetdb.io/api/v1/z79ppbqv5pdgd";

    const form = document.getElementById("form");
    const btn = document.getElementById("btn");
    
    const studentName = document.getElementById("studentName");
    const address = document.getElementById("address");
    const email = document.getElementById("email");
    const contact = document.getElementById("contact");
    const working = document.getElementById("working");
    const batch = document.getElementById("batch");
    const check = document.getElementById("check");
    const popup = document.getElementById("popup");

    function closePopup() {
        popup.style.display = "none";
    }

    form.addEventListener("submit", async function(e) {
        e.preventDefault();

        let c = contact.value;

        if (!/^[0-9]{10}$/.test(c)) {
            alert("Enter a valid 10 digit mobile number");
            return;
        }

        if (!check.checked) {
            alert("Please confirm details");
            return;
        }

        btn.innerHTML = "Submitting...";
        btn.disabled = true;

        let now = new Date();
        let currentDateTime = now.toLocaleString('en-IN'); 

        let newRollNo = 501;
        try {
            let response = await fetch(sheetURL + "?limit=1&sort_by=ROLL_NO&sort_order=desc");
            if (response.ok) {
                let data = await response.json();
                if (data.length > 0 && data[0].ROLL_NO) {
                    let lastRollNo = parseInt(data[0].ROLL_NO);
                    if (!isNaN(lastRollNo) && lastRollNo >= 501) {
                        newRollNo = lastRollNo + 1;
                    }
                }
            }
        } catch (error) {
            console.log("Error fetching last roll no, defaulting to 501", error);
        }

        fetch(sheetURL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                data: {
                    ROLL_NO: newRollNo,
                    DATE_TIME: currentDateTime,
                    NAME: studentName.value,
                    ADDRESS: address.value,
                    EMAIL_ID: email.value,
                    CONTACT_NO: c,
                    WORKING_STATUS: working.value,
                    BATCH_NAME: batch.value
                }
            })
        })
        .then(response => {
            if(response.ok) {
                popup.style.display = "block"; 
                form.reset();
            } else {
                alert("Something went wrong. Please try again.");
            }
        })
        .catch(err => {
            console.error(err);
            alert("Error submitting data.");
        })
        .finally(() => {
            btn.innerHTML = "Submit Application";
            btn.disabled = false;
        });
    });
</script>
</body>
</html>
